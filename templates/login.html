<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход — PanelBin</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #070e1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e2e8f0;
    }

    .login-box {
      width: 360px;
      background: #0d1b2e;
      border: 1px solid #1e3a5f;
      border-radius: 16px;
      padding: 40px 36px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
    }

    .login-logo {
      text-align: center;
      font-size: 32px;
      margin-bottom: 8px;
    }

    .login-title {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 4px;
    }

    .login-subtitle {
      text-align: center;
      font-size: 13px;
      color: #64748b;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 6px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      background: #0f1724;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      padding: 10px 14px;
      color: #e2e8f0;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 18px;
    }

    input:focus { border-color: #3b82f6; }

    .btn-login {
      width: 100%;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }

    .btn-login:hover { background: #1d4ed8; }
    .btn-login:active { background: #1e40af; }

    .error {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 8px;
      color: #fca5a5;
      font-size: 13px;
      padding: 10px 14px;
      margin-bottom: 16px;
      display: none;
    }

    .error.show { display: block; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="login-logo">📊</div>
    <div class="login-title">PanelBin</div>
    <div class="login-subtitle">Введите данные для входа</div>

    <div class="error" id="loginErr"></div>

    <form id="loginForm" onsubmit="doLogin(event)">
      <label>Логин</label>
      <input type="text" id="loginUser" autocomplete="username" placeholder="admin" autofocus>

      <label>Пароль</label>
      <input type="password" id="loginPass" autocomplete="current-password" placeholder="••••••••">

      <button type="submit" class="btn-login" id="loginBtn">Войти</button>
    </form>
  </div>

  <script>
    async function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('loginErr');
      err.classList.remove('show');
      btn.textContent = 'Вход...';
      btn.disabled = true;

      try {
        const r = await fetch('/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('loginUser').value.trim(),
            password: document.getElementById('loginPass').value,
          })
        });
        const j = await r.json();
        if (j.ok) {
          window.location.href = '/';
        } else {
          err.textContent = j.error || 'Неверный логин или пароль';
          err.classList.add('show');
        }
      } catch(ex) {
        err.textContent = 'Ошибка соединения';
        err.classList.add('show');
      } finally {
        btn.textContent = 'Войти';
        btn.disabled = false;
      }
    }

    // Enter → submit
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin(e);
    });
  </script>
</body>
</html>
