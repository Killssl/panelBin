<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Binom Rotations Panel</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg"></div>

  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <div class="title">Binom Rotations</div>
        </div>
      </div>

      <div class="actions">
        <button id="btnRefresh" class="btn">Обновить</button>
      </div>
    </header>

    <section class="panel">
      <div class="panel-head">
        <div class="filters">
          <label class="field">
            <span>Поиск</span>
            <input id="q" type="text" placeholder="Название / ID..." autocomplete="off"/>
          </label>

          <label class="field">
            <span>Статус</span>
            <select id="status">
              <option value="">Любой</option>
              <option value="active">active</option>
              <option value="paused">paused</option>
              <option value="deleted">deleted</option>
            </select>
          </label>

          <label class="field small">
            <span>Per page</span>
            <input id="perPage" type="number" min="1" max="500" value="50"/>
          </label>

          <button id="btnApply" class="btn primary">Применить</button>
        </div>

        <div class="meta">
          <div class="pill" id="serverTime">—</div>
          <div class="pill" id="countPill">0</div>
        </div>
      </div>

      <div class="table-wrap">
        <table class="table">
          <thead>
            <tr>
              <th style="width: 90px;">ID</th>
              <th>Rotation</th>
              <th style="width: 120px;">Status</th>
              <th style="width: 190px;">Actions</th>
            </tr>
          </thead>
          <tbody id="rows">
            <tr><td colspan="4" class="muted">Нажми “Обновить”.</td></tr>
          </tbody>
        </table>
      </div>

      <div class="details">
        <div class="details-head">
          <div>
            <div class="details-title" id="detailsTitle">Детали</div>
            <div class="details-sub" id="detailsSub">Жми Rules — увидишь карточки активных офферов.</div>
          </div>
          <div class="details-search" id="detailsSearchWrap" style="display:none;">
            <input id="offerSearch" type="text" placeholder="Поиск оффера..." autocomplete="off"/>
            <span id="offerSearchCount" class="pill">—</span>
          </div>
          <div class="pill" id="detailsMeta">—</div>
        </div>

        <div id="cards" class="cards"></div>
        <pre id="detailsJson" style="display:none">{}</pre>
      </div>
    </section>

    <footer class="footer">
      <span class="muted">
        AFF
      </span>
    </footer>
  </div>

  <script src="app.js"></script>
</body>
</html>
